<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Sello de Garantía 30 Días">
  <defs>
    <linearGradient id="goldRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7d96a"/>
      <stop offset="50%" stop-color="#d8a738"/>
      <stop offset="100%" stop-color="#b07d18"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe48a"/>
      <stop offset="100%" stop-color="#d8a738"/>
    </linearGradient>
    <radialGradient id="darkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c2a4a"/>
      <stop offset="100%" stop-color="#060d1e"/>
    </radialGradient>
    <path id="topArc" d="M 30 100 A 70 70 0 0 1 170 100" fill="none"/>
    <path id="bottomArc" d="M 36 110 A 64 64 0 0 0 164 110" fill="none"/>
  </defs>

  <!-- Serrated outer edge: 36 dots arranged on a circle -->
  <g fill="url(#goldRing)">
    <g id="serration"/>
  </g>
  <g fill="#d8a738">
    <!-- 36 small bumps as a serrated edge -->
    <circle cx="100" cy="6" r="6"/><circle cx="116.3" cy="7.4" r="6"/><circle cx="132.1" cy="11.6" r="6"/><circle cx="146.9" cy="18.5" r="6"/><circle cx="160.3" cy="27.9" r="6"/><circle cx="172.1" cy="39.7" r="6"/><circle cx="181.5" cy="53.1" r="6"/><circle cx="188.4" cy="67.9" r="6"/><circle cx="192.6" cy="83.7" r="6"/><circle cx="194" cy="100" r="6"/><circle cx="192.6" cy="116.3" r="6"/><circle cx="188.4" cy="132.1" r="6"/><circle cx="181.5" cy="146.9" r="6"/><circle cx="172.1" cy="160.3" r="6"/><circle cx="160.3" cy="172.1" r="6"/><circle cx="146.9" cy="181.5" r="6"/><circle cx="132.1" cy="188.4" r="6"/><circle cx="116.3" cy="192.6" r="6"/><circle cx="100" cy="194" r="6"/><circle cx="83.7" cy="192.6" r="6"/><circle cx="67.9" cy="188.4" r="6"/><circle cx="53.1" cy="181.5" r="6"/><circle cx="39.7" cy="172.1" r="6"/><circle cx="27.9" cy="160.3" r="6"/><circle cx="18.5" cy="146.9" r="6"/><circle cx="11.6" cy="132.1" r="6"/><circle cx="7.4" cy="116.3" r="6"/><circle cx="6" cy="100" r="6"/><circle cx="7.4" cy="83.7" r="6"/><circle cx="11.6" cy="67.9" r="6"/><circle cx="18.5" cy="53.1" r="6"/><circle cx="27.9" cy="39.7" r="6"/><circle cx="39.7" cy="27.9" r="6"/><circle cx="53.1" cy="18.5" r="6"/><circle cx="67.9" cy="11.6" r="6"/><circle cx="83.7" cy="7.4" r="6"/>
  </g>

  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="92" fill="url(#goldRing)"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#9a6f12" stroke-width="1"/>

  <!-- Inner dark core -->
  <circle cx="100" cy="100" r="68" fill="url(#darkCore)"/>

  <!-- Subtle rays from center -->
  <g stroke="#3a4a73" stroke-width="1.2" opacity="0.55">
    <line x1="100" y1="100" x2="100" y2="35"/>
    <line x1="100" y1="100" x2="146" y2="54"/>
    <line x1="100" y1="100" x2="165" y2="100"/>
    <line x1="100" y1="100" x2="146" y2="146"/>
    <line x1="100" y1="100" x2="100" y2="165"/>
    <line x1="100" y1="100" x2="54" y2="146"/>
    <line x1="100" y1="100" x2="35" y2="100"/>
    <line x1="100" y1="100" x2="54" y2="54"/>
    <line x1="100" y1="100" x2="123" y2="40"/>
    <line x1="100" y1="100" x2="160" y2="77"/>
    <line x1="100" y1="100" x2="160" y2="123"/>
    <line x1="100" y1="100" x2="123" y2="160"/>
    <line x1="100" y1="100" x2="77" y2="160"/>
    <line x1="100" y1="100" x2="40" y2="123"/>
    <line x1="100" y1="100" x2="40" y2="77"/>
    <line x1="100" y1="100" x2="77" y2="40"/>
  </g>

  <!-- Curved top text: GARANTÍA -->
  <text font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="14" fill="#ffffff" letter-spacing="2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">GARANTÍA</textPath>
  </text>

  <!-- Curved bottom text: GARANTÍA -->
  <text font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="14" fill="#ffffff" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">GARANTÍA</textPath>
  </text>

  <!-- Side stars on the gold ring -->
  <g fill="#1a2540">
    <polygon points="22,100 25,94 32,94 27,89 29,82 22,86 15,82 17,89 12,94 19,94"/>
    <polygon points="178,100 181,94 188,94 183,89 185,82 178,86 171,82 173,89 168,94 175,94"/>
  </g>

  <!-- 30 (huge gold number) -->
  <text x="100" y="105" font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="56" fill="url(#goldText)" text-anchor="middle" letter-spacing="-2">30</text>

  <!-- DÍAS label -->
  <text x="100" y="135" font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="18" fill="url(#goldText)" text-anchor="middle" letter-spacing="3">DÍAS</text>

  <!-- Small stars flanking the 30 -->
  <g fill="#d8a738">
    <polygon points="50,93 51.5,89.5 55,89.5 52.3,87.5 53.3,84 50,86 46.7,84 47.7,87.5 45,89.5 48.5,89.5"/>
    <polygon points="150,93 151.5,89.5 155,89.5 152.3,87.5 153.3,84 150,86 146.7,84 147.7,87.5 145,89.5 148.5,89.5"/>
  </g>
</svg>
